<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CaseRoomAZ</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
.card:hover { transform: scale(1.03); transition: 0.2s; }
</style>
</head>

<body class="bg-white text-black">

<header class="p-4 border-b flex justify-between">
  <h1 class="font-bold text-xl">CaseRoomAZ</h1>
  <button onclick="openAdmin()" class="border px-2">Admin</button>
</header>

<!-- FILTER -->
<div class="p-3 flex gap-2">
  <button onclick="filterCat('all')" class="border px-2">Hamısı</button>
  <button onclick="filterCat('case')" class="border px-2">Case</button>
  <button onclick="filterCat('charger')" class="border px-2">Charger</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-3 p-4"></div>

<!-- DETAIL MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center">
  <div class="bg-white p-4 w-96 rounded">
    <img id="mimg" class="w-full h-60 object-cover"/>
    <h2 id="mname" class="font-bold mt-2"></h2>
    <p id="mprice"></p>
    <p id="mdesc" class="text-sm mt-2"></p>

    <a id="mwa" class="block bg-green-600 text-white text-center py-2 mt-3">
      WhatsApp
    </a>

    <button onclick="closeModal()" class="mt-2 w-full border">Bağla</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white p-4 w-80 rounded">
    <h2 class="font-bold mb-2">Admin Login</h2>

    <input id="u" placeholder="username" class="border p-2 w-full mb-2"/>
    <input id="p" type="password" placeholder="password" class="border p-2 w-full mb-2"/>

    <button onclick="login()" class="bg-black text-white px-4 py-2 w-full">
      Giriş
    </button>
  </div>
</div>

<!-- ADD PRODUCT -->
<section id="addBox" class="hidden p-4 border-t">
<h2 class="font-bold mb-2">Məhsul əlavə et</h2>

<input id="name" placeholder="Ad" class="border p-2 w-full mb-2"/>
<input id="price" placeholder="Qiymət" class="border p-2 w-full mb-2"/>
<input id="category" placeholder="Kateqoriya" class="border p-2 w-full mb-2"/>
<textarea id="description" placeholder="Təsvir" class="border p-2 w-full mb-2"></textarea>

<input type="file" id="images" multiple class="mb-2"/>

<button onclick="addProduct()" class="bg-black text-white px-4 py-2">
Əlavə et
</button>
</section>

<script>
const client = window.supabase.createClient(
  "https://teqgdnjukgrzxovtypwj.supabase.co",
  "sb_publishable_N_DPs4mkp9GsB4phSOnuUw_Y6W-TmSL"
);

let allProducts = [];
let isAdmin = false;

// LOAD
async function loadProducts(){
  const { data } = await client.from('products').select('*');
  allProducts = data || [];
  render(allProducts);
}

// RENDER
function render(list){
  document.getElementById('products').innerHTML =
  list.map(p => `
    <div class="border p-2 rounded card cursor-pointer" onclick='openProduct(${JSON.stringify(p)})'>
      <img src="${p.images?.[0] || ''}" class="h-40 w-full object-cover"/>
      <h3 class="font-bold">${p.name}</h3>
      <p>${p.price} AZN</p>

      <button onclick="deleteProduct(${p.id})" class="text-red-500 text-xs">Sil</button>
    </div>
  `).join('');
}

// FILTER
function filterCat(cat){
  if(cat === 'all') return render(allProducts);
  render(allProducts.filter(p => p.category === cat));
}

// DETAIL
function openProduct(p){
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('mimg').src = p.images?.[0];
  document.getElementById('mname').innerText = p.name;
  document.getElementById('mprice').innerText = p.price + " AZN";
  document.getElementById('mdesc').innerText = p.description || "";

  document.getElementById('mwa').href =
    "https://wa.me/994703099330?text=" + encodeURIComponent(p.name);
}

function closeModal(){
  document.getElementById('modal').classList.add('hidden');
}

// ADMIN LOGIN
async function login(){
  const { data } = await client
    .from('admins')
    .select('*')
    .eq('username', u.value)
    .eq('password', p.value);

  if(data?.length > 0){
    document.getElementById('adminPanel').classList.add('hidden');
    document.getElementById('addBox').classList.remove('hidden');
    alert("Admin giriş uğurlu!");
  } else {
    alert("Səhv məlumat!");
  }
}

function openAdmin(){
  document.getElementById('adminPanel').classList.remove('hidden');
}

// UPLOAD
async function uploadImages(files){
  let urls = [];
  for(let f of files){
    let fileName = Date.now() + f.name;

    await client.storage.from('product-images').upload(fileName, f);

    const { data } = client.storage.from('product-images').getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }
  return urls;
}

// ADD
async function addProduct(){
  const files = images.files;
  const imgs = await uploadImages(files);

  await client.from('products').insert([{
    name: name.value,
    price: price.value,
    category: category.value,
    description: description.value,
    images: imgs
  }]);

  loadProducts();
}

// DELETE
async function deleteProduct(id){
  await client.from('products').delete().eq('id', id);
  loadProducts();
}

loadProducts();
</script>

</body>
</html>
