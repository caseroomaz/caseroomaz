<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CaseRoomAZ</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
.card { overflow:hidden; }
.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}
.card:hover { transform:scale(1.02); transition:0.2s; }
</style>
</head>

<body class="bg-gray-50 text-black">

<!-- HEADER -->
<header class="p-4 bg-white border-b flex justify-between items-center">
  <h1 class="font-bold text-xl">CaseRoomAZ</h1>
  <button onclick="openAdmin()" class="border px-3 py-1 rounded">Admin</button>
</header>

<!-- CATEGORY -->
<div class="p-3 flex gap-2 flex-wrap">
  <button onclick="filterCat('all')" class="border px-3 py-1 rounded">Hamısı</button>
  <button onclick="filterCat('smartfon')" class="border px-3 py-1 rounded">Smartfon</button>
  <button onclick="filterCat('case')" class="border px-3 py-1 rounded">Case</button>
  <button onclick="filterCat('aksesuar')" class="border px-3 py-1 rounded">Aksesuar</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-3 p-4"></div>

<!-- PRODUCT MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-md rounded-xl p-4">
    <img id="mimg" class="w-full h-64 object-cover rounded"/>
    <h2 id="mname" class="font-bold text-lg mt-2"></h2>
    <p id="mprice" class="text-green-600 font-bold"></p>
    <p id="mdesc" class="text-sm mt-2"></p>

    <a id="mwa" class="block mt-3 bg-green-600 text-white text-center py-2 rounded">
      WhatsApp Sifariş
    </a>

    <button onclick="closeModal()" class="w-full mt-2 border py-2 rounded">
      Bağla
    </button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminPanel" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-white p-4 w-80 rounded">
    <h2 class="font-bold mb-2">Admin Login</h2>

    <input id="u" placeholder="username" class="border p-2 w-full mb-2"/>
    <input id="p" type="password" placeholder="password" class="border p-2 w-full mb-2"/>

    <button onclick="login()" class="bg-black text-white w-full py-2 rounded">
      Giriş
    </button>
  </div>
</div>

<!-- ADD PRODUCT -->
<section id="addBox" class="hidden p-4 border-t bg-white">
<h2 class="font-bold mb-2">Məhsul əlavə et</h2>

<input id="name" placeholder="Ad" class="border p-2 w-full mb-2"/>
<input id="price" placeholder="Qiymət" class="border p-2 w-full mb-2"/>
<input id="category" placeholder="Kateqoriya (smartfon/case/aksesuar)" class="border p-2 w-full mb-2"/>
<textarea id="description" placeholder="Təsvir" class="border p-2 w-full mb-2"></textarea>

<input type="file" id="images" multiple class="mb-2"/>

<button onclick="addProduct()" class="bg-black text-white px-4 py-2 rounded">
Əlavə et
</button>
</section>

<script>
const client = window.supabase.createClient(
  "https://teqgdnjukgrzxovtypwj.supabase.co",
  "sb_publishable_N_DPs4mkp9GsB4phSOnuUw_Y6W-TmSL"
);

let allProducts = [];
let isAdmin = false;

// LOAD
async function loadProducts(){
  const { data } = await client.from('products').select('*');
  allProducts = data || [];
  render(allProducts);
}

// RENDER (ALL SAME SIZE LIKE REAL SHOP)
function render(list){
  document.getElementById('products').innerHTML =
  list.map(p => `
    <div class="card bg-white border rounded-lg p-2 cursor-pointer"
      onclick='openProduct(${JSON.stringify(p)})'>

      <img src="${p.images?.[0] || ''}"/>

      <h3 class="font-semibold mt-2 truncate">${p.name}</h3>
      <p class="text-green-600 font-bold">${p.price} AZN</p>
    </div>
  `).join('');
}

// FILTER
function filterCat(cat){
  if(cat === 'all') return render(allProducts);
  render(allProducts.filter(p => p.category === cat));
}

// MODAL
function openProduct(p){
  document.getElementById('modal').classList.remove('hidden');
  mimg.src = p.images?.[0];
  mname.innerText = p.name;
  mprice.innerText = p.price + " AZN";
  mdesc.innerText = p.description || "";

  mwa.href = "https://wa.me/994703099330?text=" + encodeURIComponent(p.name);
}

function closeModal(){
  document.getElementById('modal').classList.add('hidden');
}

// ADMIN LOGIN
async function login(){
  const { data } = await client
    .from('admins')
    .select('*')
    .eq('username', u.value)
    .eq('password', p.value);

  if(data?.length > 0){
    isAdmin = true;
    adminPanel.classList.add('hidden');
    addBox.classList.remove('hidden');
    alert("Admin aktiv!");
  } else {
    alert("Səhv məlumat!");
  }
}

function openAdmin(){
  adminPanel.classList.remove('hidden');
}

// UPLOAD
async function uploadImages(files){
  let urls = [];
  for(let f of files){
    let fileName = Date.now() + f.name;

    await client.storage.from('product-images').upload(fileName, f);

    const { data } = client.storage.from('product-images').getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }
  return urls;
}

// ADD
async function addProduct(){
  const imgs = await uploadImages(images.files);

  await client.from('products').insert([{
    name: name.value,
    price: price.value,
    category: category.value,
    description: description.value,
    images: imgs
  }]);

  loadProducts();
}

loadProducts();
</script>

</body>
</html>
