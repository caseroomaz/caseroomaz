<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CaseRoomAZ</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
.card {
  transition: 0.2s;
}
.card:hover {
  transform: scale(1.03);
}

.imgbox {
  width: 100%;
  height: 180px;
  overflow: hidden;
  border-radius: 10px;
  background: #f3f4f6;
}

.imgbox img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body class="bg-gray-50 text-black">

<!-- HEADER -->
<header class="p-4 border-b bg-white flex justify-between">
  <h1 class="font-bold text-xl">CaseRoomAZ</h1>
  <button onclick="openAdmin()" class="border px-3 py-1 rounded">Admin</button>
</header>

<!-- CATEGORY -->
<div class="p-3 flex gap-2 flex-wrap">
  <button onclick="filterCat('all')" class="border px-3 py-1 rounded">Hamısı</button>
  <button onclick="filterCat('smartfon')" class="border px-3 py-1 rounded">Smartfon</button>
  <button onclick="filterCat('case')" class="border px-3 py-1 rounded">Case</button>
  <button onclick="filterCat('aksesuar')" class="border px-3 py-1 rounded">Aksesuar</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4"></div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white p-4 w-80 rounded">
    <h2 class="font-bold mb-2">Admin Login</h2>
    <input id="u" placeholder="username" class="border p-2 w-full mb-2"/>
    <input id="p" type="password" placeholder="password" class="border p-2 w-full mb-2"/>
    <button onclick="login()" class="bg-black text-white px-4 py-2 w-full">Giriş</button>
  </div>
</div>

<!-- ADD -->
<section id="addBox" class="hidden p-4 border-t bg-white">
<h2 class="font-bold mb-2">Məhsul əlavə et</h2>

<input id="name" placeholder="Ad" class="border p-2 w-full mb-2"/>
<input id="price" placeholder="Qiymət" class="border p-2 w-full mb-2"/>
<input id="category" placeholder="smartfon / case / aksesuar" class="border p-2 w-full mb-2"/>
<textarea id="description" placeholder="Təsvir" class="border p-2 w-full mb-2"></textarea>

<input type="file" id="images" multiple class="mb-2"/>

<button onclick="addProduct()" class="bg-black text-white px-4 py-2 w-full">
Əlavə et
</button>
</section>

<script>
const client = window.supabase.createClient(
  "https://teqgdnjukgrzxovtypwj.supabase.co",
  "sb_publishable_N_DPs4mkp9GsB4phSOnuUw_Y6W-TmSL"
);

let allProducts = [];
let isAdmin = false;

// LOAD
async function loadProducts(){
  const { data } = await client.from('products').select('*');
  allProducts = data || [];
  render(allProducts);
}

// RENDER (FIXED UI SIZE)
function render(list){
  document.getElementById('products').innerHTML =
  list.map(p => `
    <div class="card bg-white border rounded-lg p-2 shadow-sm">

      <div class="imgbox">
        <img src="${p.images?.[0] || ''}">
      </div>

      <h3 class="font-semibold mt-2">${p.name}</h3>
      <p class="text-sm text-gray-600">${p.category}</p>

      <div class="flex justify-between items-center mt-1">
        <span class="font-bold">${p.price} AZN</span>

        <a class="text-green-600 text-xs"
        href="https://wa.me/994703099330?text=${encodeURIComponent(p.name)}">
        WhatsApp
        </a>
      </div>

    </div>
  `).join('');
}

// FILTER
function filterCat(cat){
  if(cat === 'all') return render(allProducts);
  render(allProducts.filter(p => p.category === cat));
}

// ADMIN LOGIN
async function login(){
  const { data } = await client
    .from('admins')
    .select('*')
    .eq('username', u.value)
    .eq('password', p.value);

  if(data?.length > 0){
    isAdmin = true;
    adminPanel.classList.add('hidden');
    addBox.classList.remove('hidden');
    alert("Admin login uğurlu!");
  } else {
    alert("Səhv məlumat!");
  }
}

function openAdmin(){
  adminPanel.classList.remove('hidden');
}

// UPLOAD
async function uploadImages(files){
  let urls = [];

  for(let f of files){
    let fileName = Date.now() + f.name;

    await client.storage.from('product-images').upload(fileName, f);

    const { data } = client.storage.from('product-images').getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  return urls;
}

// ADD
async function addProduct(){
  const imgs = await uploadImages(images.files);

  await client.from('products').insert([{
    name: name.value,
    price: price.value,
    category: category.value,
    description: description.value,
    images: imgs
  }]);

  loadProducts();
}

loadProducts();
</script>

</body>
</html>
